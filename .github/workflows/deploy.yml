name: Refresh data & deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily at 03:30 UTC
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1. Spin up an ephemeral self-hosted runner on Hetzner Cloud (EU IP),
  #    so the Bulgarian government API isn't reached from a geo-blocked
  #    GitHub-hosted (US/Azure) address.
  create-runner:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create.outputs.label }}
      server_id: ${{ steps.create.outputs.server_id }}
    steps:
      - name: Create Hetzner runner
        id: create
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: cx23
          location: nbg1
          image: ubuntu-24.04

  # 2. Fetch the registry data (from the EU runner) and build the site.
  build:
    needs: create-runner
    runs-on: ${{ needs.create-runner.outputs.label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch registry data
        run: python scripts/fetch_data.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 3. Deploy the built artifact to GitHub Pages (GitHub-hosted runner).
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 4. Always tear down the ephemeral runner, even if earlier jobs failed.
  delete-runner:
    needs: [create-runner, build]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Delete Hetzner runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner.outputs.label }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
